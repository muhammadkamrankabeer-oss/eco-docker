name: CI/CD Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -f docker/Dockerfile.alpine -t eco-cicd .

    - name: Run Container
      run: docker run -d -p 5000:5000 eco-cicd
